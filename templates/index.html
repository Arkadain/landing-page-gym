<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;500&display=swap');
        
        body { font-family: 'Roboto', sans-serif; }
        h1, h2, h3, .nav-link { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
    </style>
</head>
<body class="bg-black text-white min-h-screen">

    <nav class="flex justify-between items-center py-4 px-8 bg-black border-b-2 border-red-600 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-32 h-12 flex items-center justify-center font-bold text-xl tracking-wider">
                <span class="text-red-600 mr-1">CLUB</span><span class="text-white">GYM</span>
            </div>
        </div>
        
        <div class="flex gap-8">
            <a href="#" class="nav-link text-white hover:text-red-600 transition-colors text-lg tracking-wide">Ejercicios</a>
            <a href="#" class="nav-link text-white hover:text-red-600 transition-colors text-lg tracking-wide">Máquinas</a>
            <a href="#" class="nav-link text-white hover:text-red-600 transition-colors text-lg tracking-wide">Rutinas</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12 space-y-20">

        <section>
            <div class="flex items-center gap-3 mb-8">
                <div class="w-2 h-8 bg-red-600"></div>
                <h2 class="text-3xl font-bold tracking-wider">NOVEDADES</h2>
            </div>
            
            <div class="flex items-center gap-4">
                <button class="text-zinc-500 hover:text-red-600 text-4xl transition-colors">&larr;</button>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
                    <div class="bg-zinc-900 border border-zinc-800 hover:border-red-600 transition-all duration-300 h-64 p-6 flex flex-col justify-end group">
                        <span class="text-red-600 font-bold mb-2">HOY</span>
                        <h3 class="text-xl font-bold group-hover:text-red-500 transition-colors">NUEVAS CINTAS</h3>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 hover:border-red-600 transition-all duration-300 h-64 p-6 flex flex-col justify-end group">
                        <span class="text-red-600 font-bold mb-2">18 MAY</span>
                        <h3 class="text-xl font-bold group-hover:text-red-500 transition-colors">CLASE FUNCIONAL</h3>
                    </div>
                    <div class="bg-zinc-900 border border-zinc-800 hover:border-red-600 transition-all duration-300 h-64 p-6 flex flex-col justify-end group">
                        <span class="text-red-600 font-bold mb-2">AVISO</span>
                        <h3 class="text-xl font-bold group-hover:text-red-500 transition-colors">HORARIO FERIADO</h3>
                    </div>
                </div>

                <button class="text-zinc-500 hover:text-red-600 text-4xl transition-colors">&rarr;</button>
            </div>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-8">
                <div class="w-2 h-8 bg-red-600"></div>
                <h2 class="text-3xl font-bold tracking-wider">SUPLEMENTOS</h2>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-5 gap-6">
                <div class="bg-zinc-900 p-5 flex flex-col items-center text-center border-b-4 border-transparent hover:border-red-600 transition-all duration-300">
                    <div class="w-full h-40 bg-zinc-800 mb-4 flex items-center justify-center text-zinc-600">FOTO</div>
                    <h3 class="font-bold text-lg mb-1">WHEY PROTEIN</h3>
                    <p class="text-red-500 font-bold text-xl mb-4">$32.000</p>
                    <button class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 transition-colors">RESERVAR</button>
                </div>

                <div class="bg-zinc-900 p-5 flex flex-col items-center text-center border-b-4 border-transparent hover:border-red-600 transition-all duration-300">
                    <div class="w-full h-40 bg-zinc-800 mb-4 flex items-center justify-center text-zinc-600">FOTO</div>
                    <h3 class="font-bold text-lg mb-1">CREATINA</h3>
                    <p class="text-red-500 font-bold text-xl mb-4">$28.000</p>
                    <button class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 transition-colors">RESERVAR</button>
                </div>

                <div class="bg-zinc-900 p-5 flex flex-col items-center text-center border-b-4 border-transparent hover:border-red-600 transition-all duration-300">
                    <div class="w-full h-40 bg-zinc-800 mb-4 flex items-center justify-center text-zinc-600">FOTO</div>
                    <h3 class="font-bold text-lg mb-1">PRE-ENTRENO</h3>
                    <p class="text-red-500 font-bold text-xl mb-4">$18.500</p>
                    <button class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 transition-colors">RESERVAR</button>
                </div>

                <div class="bg-zinc-900 p-5 flex flex-col items-center text-center border-b-4 border-transparent hover:border-red-600 transition-all duration-300">
                    <div class="w-full h-40 bg-zinc-800 mb-4 flex items-center justify-center text-zinc-600">FOTO</div>
                    <h3 class="font-bold text-lg mb-1">BCAA</h3>
                    <p class="text-red-500 font-bold text-xl mb-4">$15.000</p>
                    <button class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 transition-colors">RESERVAR</button>
                </div>

                <div class="bg-zinc-900 p-5 flex flex-col items-center text-center border-b-4 border-transparent hover:border-red-600 transition-all duration-300">
                    <div class="w-full h-40 bg-zinc-800 mb-4 flex items-center justify-center text-zinc-600">FOTO</div>
                    <h3 class="font-bold text-lg mb-1">SHAKER 700ML</h3>
                    <p class="text-red-500 font-bold text-xl mb-4">$6.500</p>
                    <button class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 transition-colors">RESERVAR</button>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
